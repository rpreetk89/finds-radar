<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Finds | FindsRadar</title>
    <style>
        :root {
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a;
            --text-muted: #64748b; --accent: #ff4757; --accent-hover: #e03d4b;
            --radius: 16px; --shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.05);
            --shadow-hover: 0 20px 25px -5px rgba(15, 23, 42, 0.1);
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
        header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 800; text-decoration: none; color: inherit; }
        .hero { max-width: 800px; margin: 60px auto 40px auto; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: 3rem; font-weight: 900; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px; text-transform: capitalize; }
        .hero p { color: var(--text-muted); font-size: 1.25rem; }
        .filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
        .pill { background: var(--card-bg); border: 1px solid #e2e8f0; padding: 8px 18px; border-radius: 100px; font-weight: 600; font-size: 0.9rem; text-decoration: none; color: inherit; }
        .pill:hover, .pill.active { background: var(--text-main); color: white; border-color: var(--text-main); }
        .feed-container { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">🛰️ FindsRadar</a>
        <a href="/" class="pill">Back Home</a>
    </header>

    <div class="hero">
        <h1>Trending Travel Finds</h1>
        <p>Curated list of top-rated items tagged under travel this week.</p>
        
        <div class="filters">
            <a href="/" class="pill">🔥 All Finds</a>
            <a href="/gadgets/" class="pill ">⚙️ Gadgets</a>
            <a href="/travel/" class="pill active">✈️ Travel</a>
            <a href="/home/" class="pill ">🏠 Home</a>
        </div>
    </div>

    <main class="feed-container">
        <div class="grid">
            
            
                
                    
                    
                        
                        
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-all duration-300 flex flex-col group h-full">
                            <div class="relative pt-[100%] overflow-hidden bg-slate-50">
                                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&amp;w=600&amp;auto=format&amp;fit=crop" alt="Automation Test Object" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
                            </div>
                            
                            <div class="p-5 flex flex-col flex-grow">
                                <h3 class="font-bold text-slate-800 text-lg mb-2 line-clamp-2 group-hover:text-indigo-600 transition-colors">
                                    Automation Test Object
                                </h3>
                                <p class="text-slate-500 text-sm mb-4 line-clamp-2 flex-grow">
                                    
                                </p>
                                
                                <div class="flex items-center justify-between pt-4 border-t border-slate-50 mt-auto">
                                    <span class="text-2xl font-black text-slate-900">$$10.00</span>
                                    <a href="" target="_blank" rel="noopener noreferrer" class="bg-red-500 hover:bg-red-600 text-white font-semibold px-4 py-2 rounded-xl text-sm transition-all duration-200 hover:shadow-sm">
                                        Check Deal
                                    </a>
                                </div>
                            </div>
                        </div>
                    
                
            
        </div>

        
        
    </main>

</body>
</html>
