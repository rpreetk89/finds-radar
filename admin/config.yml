backend:
  name: github
  repo: rpreetk89/finds-radar
  branch: dev
  base_url: https://still-mouse-cffe.rpreetk-89.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Settings"
    files:
      - file: "_data/marketplaces.json"
        label: "Marketplaces"
        name: "marketplaces"
        fields:
          - label: "Marketplaces"
            name: "list"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
      - file: "_data/categories.json"
        label: "Categories"
        name: "categories"
        fields:
          - label: "Categories"
            name: "list"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }

  - name: "products"
    label: "Product Inventory"
    files:
      - file: "_data/products.json"
        label: "Product Inventory List"
        name: "products_file"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Name", name: "name", widget: "string", required: true }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Affiliate Link", name: "affiliate_link", widget: "string", required: true }
              - label: "Marketplace"
                name: "marketplace"
                widget: "relation"
                collection: "settings"
                file: "marketplaces"
                searchFields: ["list.name"]
                valueField: "list.name"
                displayFields: ["list.name"]
              - label: "Usage Category"
                name: "usage_category"
                widget: "relation"
                collection: "settings"
                file: "categories"
                searchFields: ["list.name"]
                valueField: "list.name"
                displayFields: ["list.name"]
              - label: "Media Gallery"
                name: "media"
                widget: "list"
                required: true
                min: 1
                fields:
                  - { label: "URL", name: "url", widget: "string", required: true }