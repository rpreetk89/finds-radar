backend:
  name: github
  repo: rpreetk89/finds-radar
  branch: main
  base_url: https://still-mouse-cffe.rpreetk-89.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "_data" # Points directly to the directory
    extension: "json"
    format: "json"
    create: false # Keeps editing tied strictly to your single data file
    files:
      - file: "_data/products.json"
        label: "Product Inventory List"
        name: "products_list"
        fields:
          - label: "All Products"
            name: "products"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Product Title", name: "title", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Affiliate URL Link", name: "url", widget: "string" }
              - { label: "Image URL", name: "image", widget: "string" }
              - { label: "Short Description", name: "description", widget: "text" }
              - { label: "Categories (Tags)", name: "categories", widget: "list" }