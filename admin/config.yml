backend:
  name: github
  repo: rpreetk89/finds-radar
  branch: main
  base_url: https://still-mouse-cffe.rpreetk-89.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "_data/products" # (or wherever your products are saved)
    create: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      # ADD THIS SECTION BELOW:
      - { label: "Description", name: "description", widget: "text" }
      # ------------------------
      - { label: "Affiliate Link", name: "affiliate_link", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }