backend:
  name: github
  repo: rpreetk89/finds-radar
  branch: dev
  base_url: https://still-mouse-cffe.rpreetk-89.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "marketplaces"
    label: "Marketplaces"
    folder: "_data/marketplaces"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }

  # 2. Categories Collection
  - name: "categories"
    label: "Categories"
    folder: "_data/categories"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }

  - name: "products"
    label: "Product Inventory"
    files:
      - file: "_data/products.json"
        label: "Product Inventory List"
        name: "products_file"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Name", name: "name", widget: "string", required: true }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Affiliate Link", name: "affiliate_link", widget: "string", required: true }
              # Relates to the folder, NOT a specific file
              - label: "Marketplace"
                name: "marketplace"
                widget: "relation"
                collection: "marketplaces"
                searchFields: ["name"]
                valueField: "name"
                displayFields: ["name"]
              # Relates to the folder, NOT a specific file
              - label: "Usage Category"
                name: "usage_category"
                widget: "relation"
                collection: "categories"
                searchFields: ["name"]
                valueField: "name"
                displayFields: ["name"]
                multiple: true
              - label: "Media Gallery"
                name: "media"
                widget: "list"
                required: true
                min: 1
                fields:
                  - { label: "URL", name: "url", widget: "string", required: true }