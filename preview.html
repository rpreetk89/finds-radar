<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindsRadar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    
    
<div class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-8">The Latest Finds</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    
    
  <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm w-full max-w-sm mx-auto">
    <div class="cursor-pointer aspect-square overflow-hidden rounded-2xl bg-slate-100 mb-4" 
         onclick="openModal(0)">
      <img src="https://m.media-amazon.com/images/I/81QcCBkZlKL._AC_SL1500_.jpg" alt="Lifelines Flameless Candle Diffuser" class="w-full h-full object-cover">
    </div>

    <h3 class="font-bold text-slate-900 text-lg">Lifelines Flameless Candle Diffuser</h3>
    <p class="text-xl font-black mt-2">$59.99</p>
    
    <button onclick="openModal(0)" 
            class="w-full mt-4 bg-slate-900 text-white py-2 rounded-xl font-bold hover:bg-slate-800 transition-colors">
      Know More
    </button>
  </div>

  <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm w-full max-w-sm mx-auto">
    <div class="cursor-pointer aspect-square overflow-hidden rounded-2xl bg-slate-100 mb-4" 
         onclick="openModal(1)">
      <img src="https://m.media-amazon.com/images/I/71IFAKP2JpL._AC_SL1000_.jpg" alt="Rug Pads Grippers - Vaccum Tech" class="w-full h-full object-cover">
    </div>

    <h3 class="font-bold text-slate-900 text-lg">Rug Pads Grippers - Vaccum Tech</h3>
    <p class="text-xl font-black mt-2">$13.86</p>
    
    <button onclick="openModal(1)" 
            class="w-full mt-4 bg-slate-900 text-white py-2 rounded-xl font-bold hover:bg-slate-800 transition-colors">
      Know More
    </button>
  </div>

  <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm w-full max-w-sm mx-auto">
    <div class="cursor-pointer aspect-square overflow-hidden rounded-2xl bg-slate-100 mb-4" 
         onclick="openModal(2)">
      <img src="https://m.media-amazon.com/images/I/71nsyo+DKvL._AC_SL1500_.jpg" alt="Extendable Flexible Duster" class="w-full h-full object-cover">
    </div>

    <h3 class="font-bold text-slate-900 text-lg">Extendable Flexible Duster</h3>
    <p class="text-xl font-black mt-2">$22.15</p>
    
    <button onclick="openModal(2)" 
            class="w-full mt-4 bg-slate-900 text-white py-2 rounded-xl font-bold hover:bg-slate-800 transition-colors">
      Know More
    </button>
  </div>


  </div>
</div>

    <div id="lightbox" class="fixed inset-0 z-[100] hidden bg-black/80 flex items-center justify-center p-4">
      <div class="bg-white max-w-lg w-full rounded-3xl p-6 relative">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl font-bold">&times;</button>
        <div id="modal-media" class="aspect-video w-full bg-slate-100 rounded-2xl overflow-hidden mb-4"></div>
        <h2 id="modal-title" class="text-2xl font-bold text-slate-900"></h2>
        <p id="modal-desc" class="text-slate-600 mt-2"></p>
        <a id="modal-link" href="#" target="_blank" class="block mt-6 bg-slate-900 text-white text-center py-3 rounded-xl font-bold">Buy Now</a>
      </div>
    </div>

<script>
  // Ensure products exist
  const allProducts = [{"name":"Lifelines Flameless Candle Diffuser","description":"A waterless, cordless, rechargeable essential oil diffuser that mimics a real candle flame.","price":"$59.99","affiliate_link":"https://www.amazon.com/Lifelines-Flameless-Candle-Essential-Oil-Aromatherapy-Diffuser/dp/B0GW1MZ8G6?th=1","category":"home","media":[{"type":"image","url":"https://m.media-amazon.com/images/I/81QcCBkZlKL._AC_SL1500_.jpg"}]},{"name":"Rug Pads Grippers - Vaccum Tech","description":"Keep Your Rug in Place & Make Corner Flat and Easily Peel Off.","affiliate_link":"https://www.amazon.com/dp/B07GPJ9PW2?th=1","price":"$13.86","category":"home","media":[{"type":"image","url":"https://m.media-amazon.com/images/I/71IFAKP2JpL._AC_SL1000_.jpg"}]},{"price":"$22.15","description":"An extendable and flexible duster for easy cleaning.","affiliate_link":"https://m.media-amazon.com/images/I/71nsyo+DKvL._AC_SL1500_.jpg","media":[{"type":"image","url":"https://m.media-amazon.com/images/I/71nsyo+DKvL._AC_SL1500_.jpg"},{"type":"video","url":"https://www.amazon.com/vdp/0a97c738328f49348f9aa63177213184?aci=amzn1.ive.vendor.video.0a97c738328f49348f9aa63177213184&product=B0CWSDT82B&ref=cm_sw_cp_r_ib_dt_Ot2bTzFYQ1jz7"}],"category":"home","name":"Extendable Flexible Duster"}];

  function openModal(index) {
    const product = allProducts[index];
    if (!product) return;
    document.getElementById('modal-title').innerText = product.name || "Product";
    document.getElementById('modal-desc').innerText = product.description || product.usp || "No description provided.";
    document.getElementById('modal-link').href = product.affiliate_link || "#";
    document.getElementById('modal-link').innerText = product.affiliate_link ? `Buy on marketplace` : `No link`;

    const media = (product.media && product.media[0]) ? product.media[0] : null;
    const container = document.getElementById('modal-media');
    container.innerHTML = "";

    if (media) {
      if (media.type === 'video') {
        container.innerHTML = `<video src="${media.url}" controls class="w-full h-full object-cover"></video>`;
      } else {
        container.innerHTML = `<img src="${media.url}" class="w-full h-full object-cover" alt="${product.name || 'Product image'}">`;
      }
    } else {
      container.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-400">No media</div>`;
    }
      
    document.getElementById('lightbox').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('lightbox').classList.add('hidden');
    const container = document.getElementById('modal-media');
    container.innerHTML = "";
  }
</script>
</body>
</html>
